<mat-toolbar style="background-color: #002147; color: white">
  <app-carmax-logo routerLink="/home" />

  <span class="spacer"></span>

  <nav class="nav-links desktop-nav">
    <a mat-button routerLink="/home" routerLinkActive="active-link">
      <mat-icon>home</mat-icon> Home
    </a>
    <a mat-button routerLink="/requests" routerLinkActive="active-link">
      <mat-icon>inbox</mat-icon> Pedidos
    </a>
    <a mat-button routerLink="/quotations" routerLinkActive="active-link">
      <mat-icon>description</mat-icon> Cotizaciones
    </a>
    <a mat-button routerLink="/evaluations" routerLinkActive="active-link">
      <mat-icon>bar_chart</mat-icon> Evaluaciones
    </a>
    <a mat-button routerLink="/orders" routerLinkActive="active-link">
      <mat-icon>receipt</mat-icon> Órdenes
    </a>
  </nav>

  <span class="spacer"></span>

  <a mat-raised-button routerLink="/request-form" class="btn-solicitar desktop-nav">
    <mat-icon>add_shopping_cart</mat-icon>
    Solicitar pedido
  </a>

  <button mat-icon-button style="color: white" class="desktop-nav">
    <mat-icon>account_circle</mat-icon>
  </button>

  <button mat-icon-button style="color: white" class="mobile-menu-btn" (click)="toggleMenu()">
    <mat-icon>{{ menuOpen ? 'close' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>

<div class="mobile-menu" [class.open]="menuOpen">
  <a mat-button routerLink="/home" routerLinkActive="active-mobile" (click)="toggleMenu()">
    <mat-icon>home</mat-icon> Home
  </a>
  <a mat-button routerLink="/requests" routerLinkActive="active-mobile" (click)="toggleMenu()">
    <mat-icon>inbox</mat-icon> Pedidos
  </a>
  <a mat-button routerLink="/quotations" routerLinkActive="active-mobile" (click)="toggleMenu()">
    <mat-icon>description</mat-icon> Cotizaciones
  </a>
  <a mat-button routerLink="/evaluations" routerLinkActive="active-mobile" (click)="toggleMenu()">
    <mat-icon>bar_chart</mat-icon> Evaluaciones
  </a>
  <a mat-button routerLink="/orders" routerLinkActive="active-mobile" (click)="toggleMenu()">
    <mat-icon>receipt</mat-icon> Órdenes
  </a>
  <a mat-button routerLink="/request-form" class="btn-solicitar-mobile" (click)="toggleMenu()">
    <mat-icon>add_shopping_cart</mat-icon> Solicitar pedido
  </a>
</div>
